<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>TSS Scheduling System</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #dc2626;
            --dark-red: #991b1b;
            --light-red: #fca5a5;
            --black: #000000;
            --dark-gray: #1a1a1a;
            --medium-gray: #2d2d2d;
            --light-gray: #404040;
            --text-white: #ffffff;
            --text-gray: #a3a3a3;
            --success: #16a34a;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--black);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: auto;
        }

        .header {
            background: linear-gradient(135deg, var(--black) 0%, var(--dark-gray) 100%);
            border-bottom: 3px solid var(--primary-red);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-red);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo-text span {
            color: var(--primary-red);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-gray);
            padding: 8px 12px;
            background: var(--medium-gray);
            border-radius: 20px;
            border: 1px solid var(--light-gray);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sync-status.online {
            border-color: var(--success);
            color: var(--success);
        }

        .sync-status.offline {
            border-color: var(--warning);
            color: var(--warning);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        .sync-status.offline .sync-dot {
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .mode-toggle {
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            color: var(--text-white);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .mode-toggle.active {
            background: var(--primary-red);
            border-color: var(--primary-red);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .error-banner {
            background: rgba(220, 38, 38, 0.2);
            border: 2px solid var(--primary-red);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .error-banner.show {
            display: flex;
        }

        .error-banner button {
            margin-left: auto;
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .month-btn {
            background: var(--medium-gray);
            border: 2px solid var(--light-gray);
            color: var(--text-white);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .month-btn:hover {
            border-color: var(--primary-red);
            background: var(--primary-red);
        }

        .current-month {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-red);
            min-width: 200px;
            text-align: center;
        }

        .date-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
        }

        .date-btn {
            background: var(--dark-gray);
            border: 2px solid var(--light-gray);
            color: var(--text-white);
            padding: 12px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 70px;
            text-align: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .date-btn.active {
            background: var(--primary-red);
            border-color: var(--primary-red);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
        }

        .date-btn:hover:not(.active) {
            border-color: var(--primary-red);
            transform: translateY(-2px);
        }

        .date-day {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
            color: var(--text-gray);
        }

        .date-number {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .date-month {
            font-size: 0.65rem;
            color: var(--text-gray);
            margin-top: 2px;
        }

        .date-count {
            position: absolute;
            top: 3px;
            right: 3px;
            background: var(--black);
            color: var(--primary-red);
            font-size: 0.65rem;
            padding: 2px 5px;
            border-radius: 8px;
            font-weight: 700;
            min-width: 18px;
        }

        .date-btn.active .date-count {
            background: var(--black);
            color: var(--primary-red);
        }

        .schedule-section {
            background: var(--dark-gray);
            border-radius: 16px;
            border: 1px solid var(--light-gray);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .section-header {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .job-count {
            background: var(--black);
            color: var(--primary-red);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .add-btn {
            background: var(--black);
            color: var(--primary-red);
            border: 2px solid var(--black);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            background: transparent;
            color: var(--text-white);
            border-color: var(--text-white);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        thead {
            background: var(--medium-gray);
            position: sticky;
            top: 0;
        }

        th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--light-red);
            border-bottom: 2px solid var(--primary-red);
            white-space: nowrap;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--light-gray);
            font-size: 0.95rem;
        }

        tbody tr {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        tbody tr:hover {
            background: rgba(220, 38, 38, 0.1);
        }

        tbody tr.completed {
            opacity: 0.6;
            background: rgba(22, 163, 74, 0.1);
        }

        tbody tr.completed td {
            text-decoration: line-through;
            color: var(--text-gray);
        }

        .col-client { width: 15%; }
        .col-insurance { width: 12%; }
        .col-location { width: 15%; }
        .col-tech { width: 12%; }
        .col-time { width: 10%; }
        .col-vehicle { width: 12%; }
        .col-officer { width: 12%; }
        .col-amount { width: 8%; }
        .col-status { width: 4%; text-align: center; }

        .time-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--primary-red);
        }

        .amount-cell {
            font-weight: 700;
            color: var(--light-red);
            font-size: 1.3rem;
            text-align: center;
        }

        .vehicle-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(220, 38, 38, 0.2);
            border: 2px solid var(--primary-red);
            border-radius: 8px;
            padding: 4px 12px;
            min-width: 40px;
        }

        .status-checkbox {
            width: 28px;
            height: 28px;
            border: 3px solid var(--light-gray);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: transparent;
            margin: 0 auto;
        }

        .status-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .status-checkbox.checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .vehicle-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .vehicle-make {
            font-weight: 600;
        }

        .empty-cell {
            color: var(--text-gray);
            font-style: italic;
            font-size: 0.85rem;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        tr:hover .action-btns {
            opacity: 1;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: var(--light-gray);
            color: var(--text-white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--primary-red);
            transform: scale(1.1);
        }

        .icon-btn.delete:hover {
            background: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--dark-gray);
            border-radius: 16px;
            border: 2px solid var(--primary-red);
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(220, 38, 38, 0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: var(--black);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--light-red);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .optional {
            color: var(--text-gray);
            font-size: 0.75rem;
            font-weight: normal;
            text-transform: none;
        }

        input, textarea {
            padding: 14px;
            border-radius: 8px;
            border: 2px solid var(--light-gray);
            background: var(--black);
            color: var(--text-white);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.3);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark-gray);
            border: 2px solid var(--primary-red);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .toast.show {
            transform: translateX(0);
        }

        .export-btns {
            display: flex;
            gap: 10px;
        }

        .export-btn {
            background: var(--medium-gray);
            border: 1px solid var(--light-gray);
            color: var(--text-white);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .export-btn:hover {
            border-color: var(--primary-red);
            background: var(--primary-red);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .action-btns {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">TSS</div>
                <div class="logo-text">SCHEDULING <span>SYSTEM</span></div>
            </div>
            <div class="header-actions">
                <div class="export-btns">
                    <button class="export-btn" onclick="exportToCSV()">📥 Export</button>
                    <button class="export-btn" onclick="importFromCSV()">📤 Import</button>
                </div>
                <button class="mode-toggle" id="syncModeBtn" onclick="toggleSyncMode()">
                    📵 Offline Mode
                </button>
                <div class="sync-status offline" id="syncStatus" onclick="checkConnection()">
                    <div class="sync-dot"></div>
                    <span id="syncText">CONNECTING...</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Error Banner -->
    <div class="error-banner" id="errorBanner">
        <span>⚠️</span>
        <span id="errorText">Connection error</span>
        <button onclick="dismissError()">Dismiss</button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Month Navigation -->
        <div class="month-nav">
            <button class="month-btn" onclick="changeMonth(-1)">◀</button>
            <div class="current-month" id="currentMonth">March 2025</div>
            <button class="month-btn" onclick="changeMonth(1)">▶</button>
        </div>

        <!-- Date Navigation - 31 days -->
        <div class="date-nav" id="dateNav">
        </div>

        <!-- Schedule Section -->
        <div class="schedule-section">
            <div class="section-header">
                <div class="section-title">
                    📅 SCHEDULE
                    <span class="job-count" id="jobCount">0 JOBS</span>
                </div>
                <button class="add-btn" onclick="openModal()">
                    <span>+</span> ADD JOB
                </button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="col-client">CLIENT NAME</th>
                            <th class="col-insurance">INSURANCE</th>
                            <th class="col-location">LOCATION</th>
                            <th class="col-tech">TECHNICIAN</th>
                            <th class="col-time">TIME</th>
                            <th class="col-vehicle">VEHICLE MAKE</th>
                            <th class="col-officer">TSS OFFICER</th>
                            <th class="col-amount">VEHICLES #</th>
                            <th class="col-status">DONE</th>
                            <th class="col-actions"></th>
                        </tr>
                    </thead>
                    <tbody id="scheduleTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title">ADD NEW JOB</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="jobForm" onsubmit="saveJob(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Client Name *</label>
                            <input type="text" id="clientName" required placeholder="John Doe">
                        </div>
                        
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="jobDate" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Time *</label>
                            <input type="time" id="jobTime" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Insurance <span class="optional">(optional)</span></label>
                            <input type="text" id="insurance" placeholder="ABC Insurance">
                        </div>
                        
                        <div class="form-group">
                            <label>Location <span class="optional">(optional)</span></label>
                            <input type="text" id="location" placeholder="123 Main St">
                        </div>
                        
                        <div class="form-group">
                            <label>Technician <span class="optional">(optional)</span></label>
                            <input type="text" id="technician" placeholder="Type any name">
                        </div>
                        
                        <div class="form-group">
                            <label>Vehicle Make <span class="optional">(optional)</span></label>
                            <input type="text" id="vehicleMake" placeholder="Toyota">
                        </div>
                        
                        <div class="form-group">
                            <label>Vehicle Model <span class="optional">(optional)</span></label>
                            <input type="text" id="vehicleModel" placeholder="Camry 2020">
                        </div>
                        
                        <div class="form-group">
                            <label>TSS Officer <span class="optional">(optional)</span></label>
                            <input type="text" id="tssOfficer" placeholder="Type any name">
                        </div>
                        
                        <div class="form-group">
                            <label># of Vehicles <span class="optional">(optional)</span></label>
                            <input type="number" id="amount" placeholder="1" min="1" step="1">
                        </div>
                        
                        <div class="form-group full-width">
                            <label>Notes <span class="optional">(optional)</span></label>
                            <textarea id="notes" placeholder="Any special requirements..."></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn">SAVE JOB</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">🔔</span>
        <span id="toastMessage">Notification</span>
    </div>

    <script>
        // ==========================================
        // YOUR FIREBASE CONFIG
        // ==========================================
        
        const firebaseConfig = {
            apiKey: "AIzaSyCgkC81ipFb5AwFfuM0YZreMH7Rkvf-QYU",
            authDomain: "tss-scheduling.firebaseapp.com",
            databaseURL: "https://tss-scheduling-default-rtdb.firebaseio.com",
            projectId: "tss-scheduling",
            storageBucket: "tss-scheduling.firebasestorage.app",
            messagingSenderId: "673967114137",
            appId: "1:673967114137:web:de91a603235d59627af508"
        };

        // ==========================================
        // APP STATE
        // ==========================================
        
        let jobs = [];
        let selectedDate = new Date().toISOString().split('T')[0];
        let currentViewDate = new Date();
        let editingId = null;
        let db = null;
        let syncListener = null;
        let useFirebase = true;
        let useLocalOnly = false;

        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
        });

        function initFirebase() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                
                db.ref('.info/connected').on('value', (snap) => {
                    if (snap.val() === true) {
                        updateSyncStatus('online', 'LIVE SYNC');
                        setupFirebaseListener();
                    } else {
                        updateSyncStatus('offline', 'OFFLINE');
                        loadFromLocal();
                    }
                });
                
            } catch (error) {
                console.error('Firebase Error:', error);
                showError('Firebase failed: ' + error.message);
                switchToLocalMode();
            }
        }

        function setupFirebaseListener() {
            if (syncListener) syncListener.off();
            
            syncListener = db.ref('jobs').on('value', (snapshot) => {
                try {
                    const data = snapshot.val();
                    if (data) {
                        jobs = Array.isArray(data) ? data : Object.values(data);
                        saveToLocal();
                        renderTable();
                        generateDateNav();
                    } else {
                        loadFromLocal();
                    }
                } catch (error) {
                    console.error('Sync error:', error);
                }
            }, (error) => {
                showError('Sync failed: ' + error.message);
                updateSyncStatus('error', 'SYNC ERROR');
                loadFromLocal();
            });
        }

        function switchToLocalMode() {
            useFirebase = false;
            useLocalOnly = true;
            updateSyncStatus('offline', 'LOCAL MODE');
            document.getElementById('syncModeBtn').textContent = '🌐 Online Mode';
            document.getElementById('syncModeBtn').classList.add('active');
            loadFromLocal();
        }

        function toggleSyncMode() {
            const btn = document.getElementById('syncModeBtn');
            
            if (useLocalOnly) {
                useLocalOnly = false;
                useFirebase = true;
                btn.textContent = '📵 Offline Mode';
                btn.classList.remove('active');
                initFirebase();
                showToast('Attempting to connect...');
            } else {
                if (syncListener) syncListener.off();
                switchToLocalMode();
                showToast('Switched to offline mode');
            }
        }

        function checkConnection() {
            if (useFirebase && db) {
                db.ref('.info/connected').once('value').then((snap) => {
                    showToast(snap.val() ? 'Connected to cloud' : 'No internet');
                });
            } else {
                showToast('Running locally');
            }
        }

        function updateSyncStatus(status, text) {
            const el = document.getElementById('syncStatus');
            el.className = 'sync-status ' + status;
            document.getElementById('syncText').textContent = text;
        }

        function loadFromLocal() {
            const local = localStorage.getItem('tss_jobs');
            if (local) {
                jobs = JSON.parse(local);
                renderTable();
                generateDateNav();
            }
        }

        function saveToLocal() {
            localStorage.setItem('tss_jobs', JSON.stringify(jobs));
        }

        function saveJobs() {
            saveToLocal();
            
            if (useFirebase && db && !useLocalOnly) {
                db.ref('jobs').set(jobs).catch(error => {
                    console.error('Cloud save failed:', error);
                });
            }
        }

        // ==========================================
        // MONTH NAVIGATION
        // ==========================================
        
        function changeMonth(direction) {
            currentViewDate.setMonth(currentViewDate.getMonth() + direction);
            generateDateNav();
        }

        // ==========================================
        // DATE NAVIGATION - 31 DAYS
        // ==========================================
        
        function generateDateNav() {
            const nav = document.getElementById('dateNav');
            const monthDisplay = document.getElementById('currentMonth');
            
            // Update month display
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                               'July', 'August', 'September', 'October', 'November', 'December'];
            monthDisplay.textContent = `${monthNames[currentViewDate.getMonth()]} ${currentViewDate.getFullYear()}`;
            
            // Generate 31 days from current view date
            let html = '';
            const startDate = new Date(currentViewDate);
            
            for (let i = 0; i < 31; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                
                const today = new Date();
                const isToday = dateStr === today.toISOString().split('T')[0];
                
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = date.getDate();
                const monthShort = date.toLocaleDateString('en-US', { month: 'short' });
                
                const isActive = dateStr === selectedDate;
                const count = jobs.filter(j => j.date === dateStr && !j.completed).length;
                
                html += `
                    <button class="date-btn ${isActive ? 'active' : ''}" onclick="selectDate('${dateStr}')">
                        <div class="date-day">${isToday ? 'TODAY' : dayName}</div>
                        <div class="date-number">${dayNum}</div>
                        <div class="date-month">${monthShort}</div>
                        ${count > 0 ? `<span class="date-count">${count}</span>` : ''}
                    </button>
                `;
            }
            
            nav.innerHTML = html;
            
            // Scroll to selected date
            setTimeout(() => {
                const activeBtn = nav.querySelector('.date-btn.active');
                if (activeBtn) {
                    activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
            }, 100);
        }

        function selectDate(date) {
            selectedDate = date;
            // Update current view to match selected date's month
            currentViewDate = new Date(date);
            generateDateNav();
            renderTable();
        }

        // ==========================================
        // TABLE RENDERING
        // ==========================================
        
        function renderTable() {
            const tbody = document.getElementById('scheduleTable');
            const dayJobs = jobs.filter(j => j.date === selectedDate).sort((a, b) => a.time.localeCompare(b.time));
            const jobCount = document.getElementById('jobCount');
            
            jobCount.textContent = `${dayJobs.length} JOB${dayJobs.length !== 1 ? 'S' : ''}`;
            
            if (dayJobs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10">
                            <div class="empty-state">
                                <div class="empty-icon">📋</div>
                                <h3>No jobs for ${formatDate(selectedDate)}</h3>
                                <p>Click "ADD JOB" to create schedule</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = dayJobs.map(job => `
                <tr class="${job.completed ? 'completed' : ''}" data-id="${job.id}">
                    <td>
                        <strong>${escapeHtml(job.clientName)}</strong>
                        ${job.notes ? `<div style="font-size: 0.8rem; color: var(--text-gray); margin-top: 4px;">${escapeHtml(job.notes)}</div>` : ''}
                    </td>
                    <td>${job.insurance ? `<span class="badge">${escapeHtml(job.insurance)}</span>` : '<span class="empty-cell">-</span>'}</td>
                    <td>${job.location ? escapeHtml(job.location) : '<span class="empty-cell">-</span>'}</td>
                    <td>${job.technician ? escapeHtml(job.technician) : '<span class="empty-cell">-</span>'}</td>
                    <td>
                        <div class="time-cell">
                            <span>🕐</span>
                            ${formatTime(job.time)}
                        </div>
                    </td>
                    <td>
                        ${job.vehicleMake ? `
                            <div class="vehicle-info">
                                <span class="vehicle-make">${escapeHtml(job.vehicleMake)}</span>
                                ${job.vehicleModel ? `<span class="vehicle-model">${escapeHtml(job.vehicleModel)}</span>` : ''}
                            </div>
                        ` : '<span class="empty-cell">-</span>'}
                    </td>
                    <td>${job.tssOfficer ? escapeHtml(job.tssOfficer) : '<span class="empty-cell">-</span>'}</td>
                    <td class="amount-cell">
                        ${job.amount ? `
                            <span class="vehicle-count">${parseInt(job.amount)}</span>
                        ` : '<span class="empty-cell">-</span>'}
                    </td>
                    <td>
                        <div class="status-checkbox ${job.completed ? 'checked' : ''}" onclick="toggleComplete('${job.id}', event)"></div>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="icon-btn" onclick="editJob('${job.id}', event)" title="Edit">✎</button>
                            <button class="icon-btn delete" onclick="deleteJob('${job.id}', event)" title="Delete">🗑</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(id = null) {
            const modal = document.getElementById('modal');
            const form = document.getElementById('jobForm');
            
            if (id) {
                const job = jobs.find(j => j.id === id);
                if (job) {
                    editingId = id;
                    document.getElementById('clientName').value = job.clientName;
                    document.getElementById('insurance').value = job.insurance || '';
                    document.getElementById('location').value = job.location || '';
                    document.getElementById('technician').value = job.technician || '';
                    document.getElementById('jobDate').value = job.date;
                    document.getElementById('jobTime').value = job.time;
                    document.getElementById('vehicleMake').value = job.vehicleMake || '';
                    document.getElementById('vehicleModel').value = job.vehicleModel || '';
                    document.getElementById('tssOfficer').value = job.tssOfficer || '';
                    document.getElementById('amount').value = job.amount || '';
                    document.getElementById('notes').value = job.notes || '';
                    document.querySelector('.modal-title').textContent = 'EDIT JOB';
                }
            } else {
                editingId = null;
                form.reset();
                document.getElementById('jobDate').value = selectedDate;
                document.querySelector('.modal-title').textContent = 'ADD NEW JOB';
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingId = null;
        }

        function closeModalOnOverlay(e) {
            if (e.target === e.currentTarget) closeModal();
        }

        function saveJob(e) {
            e.preventDefault();
            
            const jobData = {
                id: editingId || Date.now().toString(),
                clientName: document.getElementById('clientName').value.trim(),
                date: document.getElementById('jobDate').value,
                time: document.getElementById('jobTime').value,
                insurance: document.getElementById('insurance').value.trim() || null,
                location: document.getElementById('location').value.trim() || null,
                technician: document.getElementById('technician').value.trim() || null,
                vehicleMake: document.getElementById('vehicleMake').value.trim() || null,
                vehicleModel: document.getElementById('vehicleModel').value.trim() || null,
                tssOfficer: document.getElementById('tssOfficer').value.trim() || null,
                amount: document.getElementById('amount').value ? parseInt(document.getElementById('amount').value) : null,
                notes: document.getElementById('notes').value.trim() || null,
                completed: editingId ? (jobs.find(j => j.id === editingId)?.completed || false) : false,
                createdAt: editingId ? (jobs.find(j => j.id === editingId)?.createdAt || Date.now()) : Date.now()
            };
            
            if (editingId) {
                const index = jobs.findIndex(j => j.id === editingId);
                jobs[index] = jobData;
                showToast('Job updated');
            } else {
                jobs.push(jobData);
                showToast('Job added');
                scheduleNotification(jobData);
            }
            
            saveJobs();
            closeModal();
            generateDateNav();
            renderTable();
        }

        function toggleComplete(id, e) {
            e.stopPropagation();
            const job = jobs.find(j => j.id === id);
            if (job) {
                job.completed = !job.completed;
                saveJobs();
                renderTable();
                showToast(job.completed ? '✓ Completed' : 'Pending');
            }
        }

        function editJob(id, e) {
            e.stopPropagation();
            openModal(id);
        }

        function deleteJob(id, e) {
            e.stopPropagation();
            if (confirm('Delete this job?')) {
                jobs = jobs.filter(j => j.id !== id);
                saveJobs();
                generateDateNav();
                renderTable();
                showToast('Deleted');
            }
        }

        function exportToCSV() {
            const headers = ['ID', 'Client', 'Date', 'Time', 'Insurance', 'Location', 'Technician', 'VehicleMake', 'VehicleModel', 'Officer', 'Vehicles', 'Notes', 'Completed', 'CreatedAt'];
            const rows = jobs.map(j => [
                j.id, j.clientName, j.date, j.time,
                j.insurance || '', j.location || '', j.technician || '',
                j.vehicleMake || '', j.vehicleModel || '', j.tssOfficer || '',
                j.amount || '0', j.notes || '', j.completed ? 'Yes' : 'No', j.createdAt
            ]);
            
            const csv = [headers.join(','), ...rows.map(r => r.map(cell => `"${cell}"`).join(','))].join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `TSS_Jobs_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            
            showToast('Exported to CSV');
        }

        function importFromCSV() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const lines = text.split('\n');
                        
                        const newJobs = [];
                        for (let i = 1; i < lines.length; i++) {
                            if (!lines[i].trim()) continue;
                            const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
                            const job = {
                                id: values[0] || Date.now().toString() + i,
                                clientName: values[1],
                                date: values[2],
                                time: values[3],
                                insurance: values[4] || null,
                                location: values[5] || null,
                                technician: values[6] || null,
                                vehicleMake: values[7] || null,
                                vehicleModel: values[8] || null,
                                tssOfficer: values[9] || null,
                                amount: values[10] ? parseInt(values[10]) : null,
                                notes: values[11] || null,
                                completed: values[12] === 'Yes',
                                createdAt: parseInt(values[13]) || Date.now()
                            };
                            newJobs.push(job);
                        }
                        
                        if (confirm(`Import ${newJobs.length} jobs?`)) {
                            jobs = [...jobs, ...newJobs];
                            saveJobs();
                            renderTable();
                            generateDateNav();
                            showToast(`Imported ${newJobs.length} jobs`);
                        }
                    } catch (err) {
                        showError('Import failed: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function scheduleNotification(job) {
            if ('Notification' in window && Notification.permission === 'granted') {
                const jobTime = new Date(`${job.date}T${job.time}`);
                const now = new Date();
                const diff = jobTime - now;
                
                if (diff > 0) {
                    setTimeout(() => {
                        new Notification('🔴 TSS JOB', {
                            body: `${job.clientName} - ${job.amount || 1} vehicle(s) at ${job.time}`,
                            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23dc2626" width="100" height="100"/><text y=".9em" x="50%" text-anchor="middle" font-size="60" fill="white">TSS</text></svg>',
                            tag: job.id
                        });
                    }, diff);
                }
            }
        }

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }

        function formatTime(timeStr) {
            const [hours, minutes] = timeStr.split(':');
            const date = new Date();
            date.setHours(hours, minutes);
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorBanner').classList.add('show');
        }

        function dismissError() {
            document.getElementById('errorBanner').classList.remove('show');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>

</html>
